name: mekami

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: mekami-cli/go.sum
      - name: Test mekami-cli
        working-directory: mekami-cli
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: mekami-cli/go.sum
      - name: Build
        run: ./build.sh
      - name: Build graph for self-hosting
        run: ./mekami build
      - name: MCP smoke test
        run: ./mekami mcp-test
